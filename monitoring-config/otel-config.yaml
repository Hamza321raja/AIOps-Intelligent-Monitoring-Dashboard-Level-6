receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # ✅ FIXED NAME (was otlp_http, keep it same but use correctly)
  otlp_http:
    endpoint: http://jaeger:4318
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http, debug]   # ✅ FIX HERE

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]  # (optional but better for visibility)