receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # 🔥 FIXED
      http:
        endpoint: 0.0.0.0:4318   # 🔥 FIXED

processors:
  batch:

exporters:
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889

  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp, debug]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]