apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-app
  template:
    metadata:
      labels:
        app: edge-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      containers:
      - name: edge-app
        image: edge-app:v3
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: edge-service
spec:
  type: NodePort
  selector:
    app: edge-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30007